# PG-LCA-TEA Configuration

project:
  name: "PG-LCA-TEA"
  version: "0.3.0"
  description: "Phosphogypsum Life Cycle Assessment and Techno-Economic Analysis"

functional_unit:
  description: "1 tonne phosphogypsum treated"
  value: 1000 # kg
  unit: "kg"

economic:
  discount_rate: 0.05
  lifetime_years: 20
  base_currency: "USD"
  base_year: 2024

lca:
  method: "ILCD"
  normalization_reference: "EU27"
  impact_categories:
    - climate_change
    - acidification
    - eutrophication_fresh
    - eutrophication_marine
    - human_toxicity_cancer
    - human_toxicity_noncancer
    - ecotoxicity_freshwater
    - ionizing_radiation
    - particulate_matter
    - resource_depletion

tea:
  include_external_costs: true
  shadow_price_source: "CE Delft 2023"
  cost_categories:
    - capex_equipment
    - capex_installation
    - opex_materials
    - opex_utilities
    - opex_labor
    - opex_maintenance
    - revenue

uncertainty:
  monte_carlo_iterations: 1000
  default_distribution: "triangular"
  default_variation: 0.2

data_sources:
  # Local Papers
  literature:
    unparsed_path: "./data/raw/papers/unparsed" # Original PDF papers
    parsed_path: "./data/raw/papers/parsed" # MinerU-converted markdown

  # Open LCI Databases
  lci_databases:
    - name: "ELCD"
      path: "./data/raw/elcd"
      url: "https://eplca.jrc.ec.europa.eu/ELCD3/"
    - name: "USLCI"
      path: "./data/raw/uslci"
      url: "https://www.lcacommons.gov/lca-collaboration/"
    - name: "Agribalyse"
      path: "./data/raw/agribalyse"
      url: "https://agribalyse.ademe.fr/"
    - name: "Idemat"
      path: "./data/raw/idemat"
      url: "https://www.intechopen.com/chapters/78082"

  # Open Access Literature APIs
  open_access:
    unpaywall:
      base_url: "https://api.unpaywall.org/v2/"
      email: "${UNPAYWALL_EMAIL}" # Required for API access
    pubmed:
      base_url: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/"
      api_key: "${PUBMED_API_KEY}" # Optional, increases rate limit
    arxiv:
      base_url: "http://export.arxiv.org/api/"
      # No API key required
    openalex:
      base_url: "https://api.openalex.org/"
      email: "${OPENALEX_EMAIL}" # Polite pool access

  # Regulatory Databases
  regulatory:
    epa:
      base_url: "https://enviro.epa.gov/enviro/api/"
      # No API key required for public data
    eu_reg:
      base_url: "https://echa.europa.eu/api/"
      # No API key required for public data
    un_ece:
      base_url: "https://data.unece.org/api/"
      # No API key required
    iaea:
      base_url: "https://www.iaea.org/resources/databases/"
      # Manual download required

  # Industry Reports
  industry:
    usgs:
      base_url: "https://www.usgs.gov/programs/national-minerals-information-center/"
      # Manual download required
    ifa:
      base_url: "https://www.ifastat.org/"
      api_key: "${IFA_API_KEY}" # Placeholder
    fao:
      base_url: "https://www.fao.org/faostat/en/"
      # No API key required
    world_bank:
      base_url: "https://api.worldbank.org/v2/"
      # No API key required

ai:
  llm_provider: "ollama"
  llm_model: "qwen3.5:35b"
  embedding_model: "bge-m3:567m"
  embedding_dim: 1024
  ollama:
    base_url: "http://localhost:11434"
  knowledge_graph:
    storage_path: "./data/processed/kg"
    backend: "networkx" # or "neo4j"

visualization:
  dashboard_port: 8501
  export_formats:
    - pdf
    - html
    - excel

pathways:
  enabled:
    - PG-Stack # Stack Disposal (baseline)
    - PG-CementProd # Cement Production
    - PG-ConstructMat # Construction Materials
    - PG-Soil # Soil Amendment
    - PG-ChemReco # Chemical Recovery
    - PG-REEextract # REE Extraction

